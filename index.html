<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="mode-toggles">
    <button class="mode-btn" id="dark-toggle" type="button">DARK</button>
    <button class="mode-btn" id="zen-toggle" type="button">ZEN</button>
  </div>
  <main>
    <!-- <h1>Pomodoro</h1> -->
    <div class="timer" id="display" tabindex="0">25:00</div>
    <div class="controls">
      <button class="btn-start" id="start" type="button" aria-label="Start">
        <svg class="icon icon-play" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <polygon points="8,5 8,19 20,12" fill="currentColor"/>
        </svg>
        <svg class="icon icon-pause" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <rect x="5" y="5" width="4.5" height="14" rx="1.5" fill="currentColor"/>
          <rect x="14.5" y="5" width="4.5" height="14" rx="1.5" fill="currentColor"/>
        </svg>
      </button>
      <button class="btn-restart" id="restart" type="button" aria-label="Restart">
        <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M1 4v6h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M3.51 15a9 9 0 1 0 .49-4.5L1 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <!-- <div class="presets">
      <button type="button" data-min="25">25 min</button>
      <button type="button" data-min="15">15 min</button>
      <button type="button" data-min="5">5 min</button>
    </div> -->
    <!-- <p class="hint">Stream sound plays while the timer runs and stops when time is up.</p> -->
  </main>
  <audio id="stream" loop preload="auto">
    <source src="stream.mp3" type="audio/mpeg">
    <source src="https://cdn.pixabay.com/audio/2022/03/10/audio_345c853c2f.mp3" type="audio/mpeg">
  </audio>
  <script src="script.js"></script>
</body>
</html>
